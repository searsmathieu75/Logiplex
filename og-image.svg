<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="orb1" cx="15%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0E27"/>

  <!-- Ambient orbs -->
  <ellipse cx="180" cy="220" rx="360" ry="280" fill="url(#orb1)"/>
  <ellipse cx="1020" cy="440" rx="320" ry="260" fill="url(#orb2)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Logo mark -->
  <polygon points="100,54 130,71 130,105 100,122 70,105 70,71" fill="none" stroke="url(#logoGrad)" stroke-width="2.5"/>
  <polygon points="100,66 122,78.5 122,101 100,113.5 78,101 78,78.5" fill="url(#logoGrad)" opacity="0.12"/>
  <text x="100" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="24" fill="url(#logoGrad)">L</text>

  <!-- Brand name -->
  <text x="148" y="100" font-family="system-ui,sans-serif" font-weight="700" font-size="32" letter-spacing="-0.5" fill="white">Plexio</text>

  <!-- Separator line -->
  <rect x="70" y="145" width="52" height="3" rx="1.5" fill="url(#brandGrad)"/>

  <!-- Main headline -->
  <text x="70" y="230" font-family="system-ui,sans-serif" font-weight="700" font-size="54" letter-spacing="-1" fill="white">Connectez chaque logement.</text>
  <text x="70" y="300" font-family="system-ui,sans-serif" font-weight="700" font-size="54" letter-spacing="-1" fill="url(#brandGrad)">Augmentez chaque revenu.</text>

  <!-- Subtitle -->
  <text x="70" y="360" font-family="system-ui,sans-serif" font-size="21" fill="rgba(255,255,255,0.58)">WiFi · Caméras 4K · Interphones · Téléphonie IP · IPTV</text>
  <text x="70" y="393" font-family="system-ui,sans-serif" font-size="20" fill="rgba(255,255,255,0.42)">Infrastructure télécom clé en main pour immeubles au Québec</text>

  <!-- Stats cards -->
  <rect x="70" y="440" width="200" height="80" rx="10" fill="rgba(0,229,255,0.07)" stroke="rgba(0,229,255,0.22)" stroke-width="1"/>
  <text x="170" y="476" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="30" fill="#00E5FF">500+</text>
  <text x="170" y="503" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Immeubles connectés</text>

  <rect x="292" y="440" width="210" height="80" rx="10" fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.22)" stroke-width="1"/>
  <text x="397" y="476" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="30" fill="#3B82F6">15 000+</text>
  <text x="397" y="503" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Logements desservis</text>

  <rect x="524" y="440" width="200" height="80" rx="10" fill="rgba(0,229,255,0.07)" stroke="rgba(0,229,255,0.22)" stroke-width="1"/>
  <text x="624" y="476" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="30" fill="#00E5FF">98%</text>
  <text x="624" y="503" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Satisfaction client</text>

  <!-- Domain badge -->
  <rect x="70" y="553" width="155" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="148" y="576" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">plexio.ca</text>
</svg>
